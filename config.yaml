  # -----  MiMo -----------
  # Exchange rate: 1 USD = ¥6.8
  # Original pricing: CNY / 1M tokens
  # LiteLLM pricing: USD / token
  #
  # NOTE:
  # - input_cost_per_token 使用“输入缓存未命中”价格
  # - cache_read_input_token_cost 使用“输入命中缓存”价格
  # - cache_creation_input_token_cost 暂按“输入缓存未命中”价格填写

  - model_name: mimo-v2.5-pro
