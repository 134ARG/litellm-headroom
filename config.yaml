# LiteLLM model configuration
# Edit this file to add/remove models and providers.
# Docs: https://docs.litellm.ai/docs/proxy/custom_pricing

litellm_settings:
  drop_params: true

model_list:

  # -----  Anthropic official API pricing -----------
  # Source: Anthropic Claude API pricing, first-party Claude API standard/global pricing.
  # Prices are converted from USD / 1M tokens to USD / token.
  # Batch API, Fast mode, and data residency pricing modifiers are not modeled here.
  # Note: cache_creation_input_token_cost uses Anthropic's 5-minute cache write price.
  # Anthropic's 1-hour cache write price is listed in comments because LiteLLM has one generic cache creation field.

  - model_name: claude-fable-5
    litellm_params:
      model: anthropic/mimo-v2.5-pro
      api_base: os.environ/MIMO_API_BASE
      api_key: os.environ/MIMO_API_KEY
    model_info:
      # Input: $10.00 / 1M; output: $50.00 / 1M
      input_cost_per_token:  0.00001000
      output_cost_per_token: 0.00005000
      # 5m cache write: $12.50 / 1M; 1h cache write: $20.00 / 1M
      cache_creation_input_token_cost: 0.00001250
      # Cache hit: $1.00 / 1M
      cache_read_input_token_cost:     0.00000100

