      model: openai/mimo-v2.5-pro
      api_base: os.environ/MIMO_API_V1_BASE
      api_key: os.environ/MIMO_API_KEY
    model_info:
      max_input_tokens: 1048576
      # <= 256K: ¥7.00 / 1M => $1.029411765 / 1M
      input_cost_per_token:  0.000001029411765
      # <= 256K: ¥21.00 / 1M => $3.088235294 / 1M
